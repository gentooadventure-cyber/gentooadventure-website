<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 180" width="600" height="180">
    <!-- CONCEPT 3: Cordillera abstracta minimalista -->
    <defs>
        <linearGradient id="mountainGrad" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#0f1a2b"/>
            <stop offset="100%" stop-color="#1a3050"/>
        </linearGradient>
    </defs>

    <!-- Cordillera estilizada (forma de iceberg/montañas) -->
    <g transform="translate(80, 50)">
        <!-- Montañas (3 picos de diferente altura) -->
        <path d="M 0 70 L 25 10 L 50 70 Z" fill="#0f1a2b"/>
        <path d="M 35 70 L 60 25 L 90 70 Z" fill="#1f3a5c"/>
        <path d="M 75 70 L 95 5 L 120 70 Z" fill="#0f1a2b"/>

        <!-- Línea horizontal sutil debajo (suelo/horizonte) -->
        <line x1="-10" y1="75" x2="130" y2="75" stroke="#0f1a2b" stroke-width="2.5"/>

        <!-- Sol/luna pequeña arriba -->
        <circle cx="20" cy="20" r="6" fill="#f4c440"/>
    </g>

    <!-- Texto principal -->
    <text x="230" y="88" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="42" font-weight="800" fill="#0f1a2b"
          letter-spacing="0">
        Gentoo
    </text>
    <text x="230" y="128" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="42" font-weight="300" fill="#0f1a2b"
          letter-spacing="2"
          font-style="italic">
        Adventure
    </text>

    <!-- Línea decorativa -->
    <line x1="230" y1="138" x2="290" y2="138" stroke="#f4c440" stroke-width="3"/>
</svg>
