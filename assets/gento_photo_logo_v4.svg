<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 600" width="600" height="600">
    <!-- GENTO Photo Editor — Logo profesional v4 -->
    <defs>
        <linearGradient id="goldPro" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f7d670"/>
            <stop offset="50%" stop-color="#e8b73d"/>
            <stop offset="100%" stop-color="#b8870a"/>
        </linearGradient>
        <linearGradient id="bladeShadow" x1="0%" y1="0%" x2="0%" y2="100%">
            <stop offset="0%" stop-color="#000" stop-opacity="0"/>
            <stop offset="100%" stop-color="#000" stop-opacity="0.25"/>
        </linearGradient>
        <radialGradient id="ringGrad" cx="50%" cy="40%" r="60%">
            <stop offset="0%" stop-color="#2a2a2a"/>
            <stop offset="100%" stop-color="#0a0a0a"/>
        </radialGradient>
        <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
            <feOffset dx="0" dy="4" result="offsetblur"/>
            <feComponentTransfer><feFuncA type="linear" slope="0.3"/></feComponentTransfer>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <g filter="url(#softShadow)">
        <!-- Anillo exterior negro premium -->
        <circle cx="300" cy="300" r="260" fill="url(#ringGrad)"/>
        <!-- Anillo dorado fino interno -->
        <circle cx="300" cy="300" r="232" fill="none" stroke="#b8870a" stroke-width="1.5" opacity="0.6"/>
        <!-- Fondo del aperture -->
        <circle cx="300" cy="300" r="220" fill="#fafafa"/>

        <!-- APERTURE BLADES (6 hojas geométricas) -->
        <g transform="translate(300, 300)">
            <g transform="rotate(0)">
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#goldPro)"/>
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#bladeShadow)" opacity="0.4"/>
            </g>
            <g transform="rotate(60)">
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#goldPro)"/>
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#bladeShadow)" opacity="0.4"/>
            </g>
            <g transform="rotate(120)">
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#goldPro)"/>
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#bladeShadow)" opacity="0.4"/>
            </g>
            <g transform="rotate(180)">
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#goldPro)"/>
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#bladeShadow)" opacity="0.4"/>
            </g>
            <g transform="rotate(240)">
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#goldPro)"/>
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#bladeShadow)" opacity="0.4"/>
            </g>
            <g transform="rotate(300)">
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#goldPro)"/>
                <path d="M 0 -210 L 165 -125 L 0 -50 Z" fill="url(#bladeShadow)" opacity="0.4"/>
            </g>

            <!-- Líneas finas entre hojas -->
            <g stroke="#9a700a" stroke-width="1" opacity="0.4" fill="none">
                <line x1="0" y1="-210" x2="0" y2="-50"/>
                <line transform="rotate(60)" x1="0" y1="-210" x2="0" y2="-50"/>
                <line transform="rotate(120)" x1="0" y1="-210" x2="0" y2="-50"/>
                <line transform="rotate(180)" x1="0" y1="-210" x2="0" y2="-50"/>
                <line transform="rotate(240)" x1="0" y1="-210" x2="0" y2="-50"/>
                <line transform="rotate(300)" x1="0" y1="-210" x2="0" y2="-50"/>
            </g>
        </g>

        <!-- PINGÜINO refinado -->
        <g transform="translate(300, 300)">
            <!-- Cabeza -->
            <path d="M -85 -20 C -85 -75, -45 -100, 0 -100 C 45 -100, 90 -75, 90 -20 C 90 25, 65 60, 30 70 C -10 75, -50 65, -75 40 C -90 20, -90 -5, -85 -20 Z" fill="#0d0d0d"/>
            <!-- Highlight -->
            <path d="M -50 -75 C -30 -90, 0 -95, 30 -90 C 50 -85, 60 -75, 50 -70 C 20 -80, -20 -78, -40 -65 Z" fill="#2a2a2a" opacity="0.8"/>

            <!-- Ojo blanco -->
            <ellipse cx="-15" cy="-45" rx="22" ry="20" fill="#ffffff"/>
            <!-- Pupila -->
            <circle cx="-10" cy="-42" r="9" fill="#0d0d0d"/>
            <!-- Brillo del ojo -->
            <circle cx="-7" cy="-46" r="3.5" fill="#ffffff"/>
            <circle cx="-13" cy="-39" r="1.5" fill="#ffffff" opacity="0.6"/>

            <!-- Pico -->
            <path d="M 50 -10 L 130 -22 L 145 -8 L 138 0 L 60 8 Z" fill="#f08020"/>
            <path d="M 50 -10 L 130 -22 L 145 -8 L 60 -5 Z" fill="#f7a040"/>
            <line x1="55" y1="-7" x2="142" y2="-12" stroke="#a85010" stroke-width="1.2" opacity="0.5"/>
        </g>

        <!-- Reflejo de lente -->
        <ellipse cx="220" cy="160" rx="80" ry="30" fill="#ffffff" opacity="0.12"/>
    </g>
</svg>
