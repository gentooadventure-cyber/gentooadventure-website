<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
    <!-- GENTO Photo Editor — App Icon profesional -->
    <defs>
        <linearGradient id="goldA" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4d03f"/>
            <stop offset="100%" stop-color="#b8870a"/>
        </linearGradient>
        <radialGradient id="lensInnerA" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#3a3a3a"/>
            <stop offset="60%" stop-color="#0d0d0d"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <radialGradient id="bgGrad" cx="50%" cy="30%" r="80%">
            <stop offset="0%" stop-color="#1a1a1a"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <radialGradient id="glassA" cx="30%" cy="30%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.3"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <!-- Fondo cuadrado (iOS lo redondea solo) -->
    <rect width="1024" height="1024" fill="url(#bgGrad)"/>

    <!-- Lente centrada -->
    <g transform="translate(512, 512)">
        <!-- Anillo exterior dorado -->
        <circle cx="0" cy="0" r="380" fill="none" stroke="url(#goldA)" stroke-width="3"/>
        <!-- Cuerpo metálico negro -->
        <circle cx="0" cy="0" r="360" fill="#0a0a0a"/>
        <!-- Anillo dorado interno -->
        <circle cx="0" cy="0" r="340" fill="none" stroke="url(#goldA)" stroke-width="6"/>
        <!-- Anillo metálico medio -->
        <circle cx="0" cy="0" r="320" fill="#1a1a1a"/>
        <circle cx="0" cy="0" r="295" fill="none" stroke="#3a3a3a" stroke-width="2"/>

        <!-- Vidrio interior con profundidad -->
        <circle cx="0" cy="0" r="280" fill="url(#lensInnerA)"/>

        <!-- APERTURE 8 hojas -->
        <g>
            <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
            <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.15"/>
            <g transform="rotate(45)">
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.2"/>
            </g>
            <g transform="rotate(90)">
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.25"/>
            </g>
            <g transform="rotate(135)">
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.3"/>
            </g>
            <g transform="rotate(180)">
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.35"/>
            </g>
            <g transform="rotate(225)">
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.3"/>
            </g>
            <g transform="rotate(270)">
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.25"/>
            </g>
            <g transform="rotate(315)">
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="url(#goldA)"/>
                <path d="M 0 -260 L 184 -184 L 0 -92 Z" fill="#000" opacity="0.2"/>
            </g>
        </g>

        <!-- Centro vidrio negro -->
        <circle cx="0" cy="0" r="92" fill="#0a1929"/>
        <circle cx="0" cy="0" r="72" fill="#0d1f30"/>
        <!-- Punto dorado central -->
        <circle cx="0" cy="0" r="6" fill="url(#goldA)"/>

        <!-- Reflejo highlight superior izq -->
        <ellipse cx="-50" cy="-65" rx="45" ry="25" fill="#ffffff" opacity="0.3" transform="rotate(-30 -50 -65)"/>

        <!-- Reflejo grande del cristal -->
        <circle cx="0" cy="0" r="280" fill="url(#glassA)"/>

        <!-- LED rojo (record indicator) -->
        <circle cx="220" cy="-220" r="12" fill="#e74c3c"/>
        <circle cx="220" cy="-220" r="6" fill="#ff6b5b"/>
        <circle cx="217" cy="-223" r="3" fill="#ffffff" opacity="0.7"/>
    </g>

    <!-- GENTO en la parte inferior, sutil -->
    <text x="512" y="945" text-anchor="middle"
          font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
          font-size="58" font-weight="300" fill="#e8e8e8"
          letter-spacing="14">GENTO</text>
</svg>
