<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 280" width="700" height="280">
    <defs>
        <linearGradient id="goldL" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#f4d03f"/>
            <stop offset="100%" stop-color="#b8870a"/>
        </linearGradient>
        <radialGradient id="lensInnerL" cx="35%" cy="35%" r="65%">
            <stop offset="0%" stop-color="#3a3a3a"/>
            <stop offset="60%" stop-color="#0d0d0d"/>
            <stop offset="100%" stop-color="#000000"/>
        </radialGradient>
        <radialGradient id="glassL" cx="30%" cy="30%" r="50%">
            <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <g transform="translate(140, 140)">
        <ellipse cx="0" cy="115" rx="100" ry="6" fill="#000" opacity="0.2"/>
        <circle cx="0" cy="0" r="115" fill="#0a0a0a"/>
        <circle cx="0" cy="0" r="108" fill="none" stroke="url(#goldL)" stroke-width="2"/>
        <circle cx="0" cy="0" r="100" fill="#1a1a1a"/>
        <circle cx="0" cy="0" r="92" fill="none" stroke="#3a3a3a" stroke-width="1"/>
        <circle cx="0" cy="0" r="85" fill="url(#lensInnerL)"/>

        <g>
            <path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/>
            <path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.15"/>
            <g transform="rotate(45)"><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.2"/></g>
            <g transform="rotate(90)"><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.25"/></g>
            <g transform="rotate(135)"><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.3"/></g>
            <g transform="rotate(180)"><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.35"/></g>
            <g transform="rotate(225)"><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.3"/></g>
            <g transform="rotate(270)"><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.25"/></g>
            <g transform="rotate(315)"><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="url(#goldL)"/><path d="M 0 -80 L 56 -57 L 0 -28 Z" fill="#000" opacity="0.2"/></g>
        </g>

        <circle cx="0" cy="0" r="44" fill="#0a1929"/>
        <circle cx="0" cy="0" r="40" fill="#0d1f30"/>

        <!-- Luna pixel art embebida (base64) -->
        <image xlink:href="data:image/png;base64," x="-36" y="-36" width="72" height="72" preserveAspectRatio="xMidYMid meet" image-rendering="pixelated" xmlns:xlink="http://www.w3.org/1999/xlink"/>

        <circle cx="0" cy="0" r="85" fill="url(#glassL)" pointer-events="none"/>

        <circle cx="65" cy="-65" r="4" fill="#e74c3c"/>
        <circle cx="65" cy="-65" r="2" fill="#ff6b5b"/>
    </g>

    <g transform="translate(310, 140)">
        <text x="0" y="-10" font-family="Helvetica Neue, Arial, sans-serif"
              font-size="64" font-weight="200" fill="#e8eef7"
              letter-spacing="8">GENTO</text>
        <line x1="0" y1="14" x2="280" y2="14" stroke="url(#goldL)" stroke-width="2"/>
        <text x="0" y="42" font-family="Helvetica Neue, Arial, sans-serif"
              font-size="14" font-weight="500" fill="#8aa5c4"
              letter-spacing="12">PHOTO EDITOR</text>
    </g>
</svg>
